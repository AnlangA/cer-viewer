[package]
name = "cer-viewer"
version = "0.1.0"
edition = "2024"

[dependencies]
eframe = "0.33.3"
egui = "0.33.3"
x509-parser = "0.18.1"
pem = "3.0.6"
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.23", features = ["fmt", "std"] }
hex = "0.4.3"
chrono = "0.4.44"
rfd = "0.17.2"
oid-registry = { version = "0.8.1", features = ["crypto", "x509", "x962"] }
sha1 = "0.10.6"
sha2 = "0.10.8"
arboard = "3.4.1"
thiserror = "2.0"

[dev-dependencies]
