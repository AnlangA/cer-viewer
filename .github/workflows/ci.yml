name: CI

on:
  push:
    branches: [main, master, develop]
    tags: ['v*']
  pull_request:
    branches: [main, master, develop]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test
    if: !startsWith(github.ref, 'refs/tags/')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        rust: [stable, beta]
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt, clippy

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libx11-dev libxi-dev libgl1-mesa-dev

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run fmt check
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --verbose --all-features

      - name: Run tests without network feature
        run: cargo test --verbose

  fuzz:
    name: Fuzz testing
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: nightly

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz

      - name: Run fuzz tests
        run: |
          if [ -d "fuzz" ]; then
            for target in fuzz/fuzz_targets/*; do
              cargo +nightly fuzz run --release -s sanity -- \
                "$(basename "$target" .rs)" || true
            done
          else
            echo "No fuzz targets found"
          fi
        continue-on-error: true

  security:
    name: Security audit
    if: !startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run cargo audit
        run: cargo audit
        continue-on-error: true

  build-release:
    name: Build ${{ matrix.target }}
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: cer-viewer
            asset_name: cer-viewer-linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: cer-viewer
            asset_name: cer-viewer-macos-aarch64.dmg
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: cer-viewer
            asset_name: cer-viewer-macos-x86_64.dmg
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: cer-viewer.exe
            asset_name: cer-viewer-windows-x86_64.exe
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libx11-dev libxi-dev libgl1-mesa-dev

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip binary (Unix)
        if: matrix.os != 'windows-latest'
        run: strip target/${{ matrix.target }}/release/${{ matrix.artifact_name }}

      - name: Create macOS app bundle and DMG
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          VOLUME_NAME="${{ matrix.asset_name }}"
          VOLUME_NAME="${VOLUME_NAME%.dmg}"
          mkdir -p cer-viewer.app/Contents/MacOS
          cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} cer-viewer.app/Contents/MacOS/
          cat > cer-viewer.app/Contents/Info.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>cer-viewer</string>
              <key>CFBundleIdentifier</key>
              <string>com.anlanga.cer-viewer</string>
              <key>CFBundleName</key>
              <string>cer-viewer</string>
              <key>CFBundleVersion</key>
              <string>${VERSION}</string>
              <key>CFBundleShortVersionString</key>
              <string>${VERSION}</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>NSHighResolutionCapable</key>
              <true/>
              <key>NSPrincipalClass</key>
              <string>NSApplication</string>
          </dict>
          </plist>
          EOF
          codesign --force --deep -s - cer-viewer.app
          hdiutil create -volname "${VOLUME_NAME}" -srcfolder cer-viewer.app -ov -format UDZO ${{ matrix.asset_name }}

      - name: Rename binary (non-macOS)
        if: matrix.os != 'macos-latest'
        shell: bash
        run: |
          mv target/${{ matrix.target }}/release/${{ matrix.artifact_name }} ${{ matrix.asset_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

  release:
    name: Create Release
    needs: build-release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -la artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          body: |
            ## cer-viewer ${{ github.ref_name }}

            ### Downloads
            - **Windows**: `cer-viewer-windows-x86_64.exe`
            - **macOS (Apple Silicon)**: `cer-viewer-macos-aarch64.dmg`
            - **macOS (Intel)**: `cer-viewer-macos-x86_64.dmg`
            - **Linux**: `cer-viewer-linux-x86_64`
          files: |
            artifacts/cer-viewer-windows-x86_64.exe/cer-viewer-windows-x86_64.exe
            artifacts/cer-viewer-macos-aarch64.dmg/cer-viewer-macos-aarch64.dmg
            artifacts/cer-viewer-macos-x86_64.dmg/cer-viewer-macos-x86_64.dmg
            artifacts/cer-viewer-linux-x86_64/cer-viewer-linux-x86_64

  code-coverage:
    name: Code coverage
    if: !startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov

      - name: Generate coverage report
        run: cargo llvm-cov --all-features --lcov --output-path lcov.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: false
